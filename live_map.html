<!DOCTYPE html>
<html>
<head>
    <title>Live Tracking</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>
<body>

<h2>Live Vehicle Tracking</h2>
<div id="map" style="height: 500px;"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([28.6, 77.2], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
}).addTo(map);

let markers = {};

async function fetchVehicles() {
    let res = await fetch("http://127.0.0.1:8000/api/vehicles/");
    let data = await res.json();

    data.forEach(v => {
        if (markers[v.id]) {
            markers[v.id].setLatLng([v.latitude, v.longitude]);
        } else {
            markers[v.id] = L.marker([v.latitude, v.longitude])
                .addTo(map)
                .bindPopup(v.name);
        }
    });
}

// refresh every 2 sec
setInterval(fetchVehicles, 2000);
</script>

</body>
</html>
